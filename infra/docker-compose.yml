# Bootable podkit cloud: control-plane + its Postgres.
#
# This file lives in infra/, so the build context `..` points at the repo root.
# The control-plane talks to the host Docker daemon via the mounted socket to
# build images and spawn per-project app containers.
services:
  postgres:
    image: postgres:16-alpine
    networks: [podkit]
    environment:
      POSTGRES_PASSWORD: podkit
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 30

  controlplane:
    build:
      context: ..
      dockerfile: infra/Dockerfile.controlplane
    networks: [podkit]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PODKIT_CP_DATABASE_URL: postgres://postgres:podkit@postgres:5432/postgres
      PODKIT_ADMIN_DATABASE_URL: postgres://postgres:podkit@postgres:5432/postgres
      PODKIT_API_KEY: podkit-dev
      PODKIT_API_PORT: "8080"
      PODKIT_GATEWAY_PORT: "8090"
      PODKIT_CONSOLE_DIR: /app/apps/cloud-console/dist
      # Control-plane runs in a container, so it reaches app containers by name
      # over this shared network (not via the host's loopback). App containers
      # are spawned onto it via the mounted Docker socket.
      PODKIT_APP_NETWORK: podkit
    ports:
      - "8080:8080"
      - "8090:8090"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

# Fixed network name so the control-plane can attach spawned app containers to
# it by name regardless of the compose project name.
networks:
  podkit:
    name: podkit

volumes:
  pgdata:
